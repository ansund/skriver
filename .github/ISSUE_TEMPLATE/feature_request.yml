name: Feature request
description: Suggest an improvement for skriver
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should skriver do?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Share examples, artifacts, or related tools if useful
