server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location = /install.sh {
    add_header Content-Type text/plain;
    add_header Cache-Control "public, max-age=300";
    try_files $uri =404;
  }

  location = /install.ps1 {
    add_header Content-Type text/plain;
    add_header Cache-Control "public, max-age=300";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
